  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--ink:#0e0c0a;--paper:#f0e9d8;--red:#c0392b;--display:'Playfair Display',serif;--body:'EB Garamond',serif;--mono:'Space Mono',monospace}
    body{background:var(--ink);color:var(--paper);font-family:var(--body);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:4rem 2rem;text-align:center}
    nav{position:fixed;top:0;left:0;right:0;padding:1.4rem 3rem;border-bottom:1px solid #1a1714;background:var(--ink);display:flex;justify-content:space-between;align-items:center;z-index:100}
    .nav-brand{font-family:var(--mono);font-size:.7rem;letter-spacing:.15em;color:rgba(255,255,255,.4)}
    .nav-brand span{color:var(--red)}
    .nav-back{font-family:var(--mono);font-size:.65rem;letter-spacing:.1em;color:rgba(255,255,255,.4);text-decoration:none;transition:color .2s}
    .nav-back:hover{color:var(--red)}
    .hero-label{font-family:var(--mono);font-size:.6rem;letter-spacing:.2em;color:var(--red);text-transform:uppercase;margin-bottom:1.5rem}
    h1{font-family:var(--display);font-size:clamp(3rem,8vw,6rem);font-weight:900;color:var(--paper);margin-bottom:1.5rem;line-height:1}
    .sub{font-family:var(--body);font-size:1.1rem;font-style:italic;color:rgba(255,255,255,.4);max-width:500px;margin:0 auto 3rem;line-height:1.6}
    .coming{font-family:var(--mono);font-size:.65rem;letter-spacing:.15em;color:rgba(255,255,255,.2);text-transform:uppercase;border:1px solid #1a1714;padding:1rem 2rem;display:inline-block;margin-bottom:2rem}
    .ig-link{display:inline-block;font-family:var(--mono);font-size:.65rem;letter-spacing:.12em;color:var(--paper);border:1px solid rgba(255,255,255,.2);padding:.8rem 1.6rem;text-decoration:none;text-transform:uppercase;transition:border-color .2s,color .2s}
    .ig-link:hover{border-color:var(--red);color:var(--red)}
    .back-link{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%);font-family:var(--mono);font-size:.6rem;letter-spacing:.1em;color:rgba(255,255,255,.3);text-decoration:none;transition:color .2s}
    .back-link:hover{color:var(--red)}
  </style>
</head>
