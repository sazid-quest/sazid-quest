<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Books — Sazid</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,400&family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --ink:#0e0c0a;--paper:#f0e9d8;--cream:#e8e0ce;--red:#c0392b;
      --muted:rgba(14,12,10,.4);--border:rgba(14,12,10,.1);
      --display:'Playfair Display',serif;
      --body:'EB Garamond',serif;
      --mono:'Space Mono',monospace;
    }
    body{background:var(--paper);color:var(--ink);font-family:var(--body)}

    /* NAV */
    nav{display:flex;align-items:center;justify-content:space-between;padding:1.2rem 3rem;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--paper);z-index:50}
    .nav-logo{font-family:var(--mono);font-size:.7rem;letter-spacing:.2em;text-decoration:none;color:var(--ink)}
    .nav-logo span{color:var(--red)}
    .nav-back{font-family:var(--mono);font-size:.62rem;letter-spacing:.1em;color:var(--muted);text-decoration:none;transition:color .2s}
    .nav-back:hover{color:var(--red)}

    /* HEADER */
    .page-header{padding:4rem 3rem 0;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:flex-end}
    .page-header-left{}
    .page-tag{font-family:var(--mono);font-size:.6rem;letter-spacing:.18em;text-transform:uppercase;color:var(--red);display:block;margin-bottom:.8rem}
    .page-title{font-family:var(--display);font-size:3.5rem;font-weight:900;line-height:1;letter-spacing:-.02em;margin-bottom:1.5rem}
    .page-sub{font-family:var(--body);font-size:1rem;font-style:italic;color:var(--muted);max-width:380px;line-height:1.6;margin-bottom:2rem}
    .page-header-stats{text-align:right;padding-bottom:2rem}
    .stat-big{font-family:var(--display);font-size:3rem;font-weight:700;color:var(--red);line-height:1}
    .stat-label{font-family:var(--mono);font-size:.55rem;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-top:.2rem}

    /* FILTER TABS */
    .shelf-tabs{display:flex;border-bottom:1px solid var(--border);padding:0 3rem}
    .shelf-tab{font-family:var(--mono);font-size:.6rem;letter-spacing:.12em;text-transform:uppercase;padding:.7rem 1.2rem;border:none;background:transparent;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .2s}
    .shelf-tab:hover{color:var(--ink)}
    .shelf-tab.active{color:var(--ink);border-bottom-color:var(--red)}

    /* YEAR SECTIONS */
    .shelf-section{padding:3rem 3rem 0}
    .year-label{font-family:var(--mono);font-size:.6rem;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);margin-bottom:1.5rem;display:flex;align-items:center;gap:1rem}
    .year-label::after{content:'';flex:1;height:1px;background:var(--border)}

    /* BOOK LIST — minimal, spine-like */
    .book-list{display:grid;grid-template-columns:1fr;border-top:1px solid var(--border)}
    .book-row{
      display:grid;grid-template-columns:2rem 1fr auto auto;
      align-items:baseline;gap:1.5rem;
      padding:.9rem 0;border-bottom:1px solid var(--border);
      transition:background .15s;
    }
    .book-row:hover{background:var(--cream);padding-left:.5rem;margin-left:-.5rem}
    .book-index{font-family:var(--mono);font-size:.55rem;letter-spacing:.1em;color:var(--border)}
    .book-title{font-family:var(--display);font-size:1.05rem;font-weight:700;color:var(--ink);line-height:1.3}
    .book-author{font-family:var(--body);font-size:.9rem;font-style:italic;color:var(--muted)}
    .book-meta{display:flex;gap:.8rem;align-items:center;justify-content:flex-end}
    .book-tag{font-family:var(--mono);font-size:.5rem;letter-spacing:.08em;text-transform:uppercase;color:rgba(14,12,10,.35);border:1px solid var(--border);padding:.2rem .55rem;border-radius:20px;white-space:nowrap}
    .book-tag.read{color:var(--red);border-color:rgba(192,57,43,.2)}
    .book-rating{font-family:var(--mono);font-size:.6rem;color:var(--red);letter-spacing:.05em}

    /* CURRENTLY READING */
    .current-reading{
      margin:0 3rem 2rem;padding:1.5rem 2rem;
      background:var(--cream);border-left:3px solid var(--red);
      display:flex;align-items:baseline;gap:1.5rem;
    }
    .current-label{font-family:var(--mono);font-size:.55rem;letter-spacing:.15em;text-transform:uppercase;color:var(--red);white-space:nowrap}
    .current-book{font-family:var(--display);font-size:1.1rem;font-weight:700}
    .current-author{font-family:var(--body);font-style:italic;color:var(--muted);font-size:.95rem;margin-left:.5rem}

    /* GOODREADS LINK */
    .goodreads-strip{
      margin:3rem 3rem 0;padding:2rem 0;
      border-top:1px solid var(--border);
      display:flex;align-items:center;justify-content:space-between;
    }
    .goodreads-text{font-family:var(--body);font-size:.95rem;font-style:italic;color:var(--muted)}
    .goodreads-link{
      font-family:var(--mono);font-size:.62rem;letter-spacing:.1em;
      text-transform:uppercase;color:var(--ink);
      border-bottom:1.5px solid var(--red);padding-bottom:.2rem;
      text-decoration:none;transition:color .2s;
    }
    .goodreads-link:hover{color:var(--red)}

    footer{padding:2rem 3rem;border-top:1px solid var(--border);display:flex;justify-content:space-between;margin-top:4rem}
    .footer-copy{font-family:var(--mono);font-size:.6rem;color:var(--muted)}
    .footer-back{font-family:var(--mono);font-size:.6rem;color:var(--muted);text-decoration:none;transition:color .2s}
    .footer-back:hover{color:var(--red)}

    @media(max-width:700px){
      nav,section,.shelf-tabs,.shelf-section,.current-reading,.goodreads-strip{padding-left:1.5rem;padding-right:1.5rem}
      .page-header{flex-direction:column;padding:3rem 1.5rem 0;align-items:flex-start}
      .page-header-stats{text-align:left}
      .book-row{grid-template-columns:1.5rem 1fr;gap:.8rem}
      .book-meta{display:none}
    }
  </style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo"><span>*</span> SAZID</a>
  <a href="index.html" class="nav-back">← Back to site</a>
</nav>

<div class="page-header">
  <div class="page-header-left">
    <span class="page-tag">* Bedford St. — Reading Log</span>
    <h1 class="page-title">Books</h1>
    <p class="page-sub">A quiet record of reading. Not a performance — just what I've been sitting with.</p>
  </div>
  <div class="page-header-stats">
    <div id="stat-total" class="stat-big">—</div>
    <div class="stat-label">Books Read</div>
  </div>
</div>

<div class="shelf-tabs">
  <button class="shelf-tab active" onclick="filterBooks('all',this)">All</button>
  <button class="shelf-tab" onclick="filterBooks('2025',this)">2025</button>
  <button class="shelf-tab" onclick="filterBooks('2024',this)">2024</button>
  <button class="shelf-tab" onclick="filterBooks('2023',this)">2023</button>
  <button class="shelf-tab" onclick="filterBooks('fiction',this)">Fiction</button>
  <button class="shelf-tab" onclick="filterBooks('nonfiction',this)">Non-fiction</button>
</div>

<div id="currently-reading"></div>
<div id="books-container"></div>

<div class="goodreads-strip">
  <span class="goodreads-text">Full reading history on Goodreads</span>
  <a href="https://goodreads.com" target="_blank" class="goodreads-link">View Profile ↗</a>
</div>

<footer>
  <span class="footer-copy">* Sazid's Reading Log</span>
  <a href="index.html" class="footer-back">← sazid.quest</a>
</footer>

<script>
  // ── BOOKS DATA ──────────────────────────────────────────────
  // Generated from Goodreads CSV — update by replacing this array
  const BOOKS = [
    // 2025
    {title:"Educated",author:"Tara Westover",year:2025,genre:"nonfiction",rating:5,read:true},
    {title:"The Remains of the Day",author:"Kazuo Ishiguro",year:2025,genre:"fiction",rating:5,read:true},
    {title:"Sapiens",author:"Yuval Noah Harari",year:2025,genre:"nonfiction",rating:4,read:true},
    {title:"Giovanni's Room",author:"James Baldwin",year:2025,genre:"fiction",rating:5,read:true},
    {title:"Why Nations Fail",author:"Acemoglu & Robinson",year:2025,genre:"nonfiction",rating:4,read:true},

    // 2024
    {title:"The God of Small Things",author:"Arundhati Roy",year:2024,genre:"fiction",rating:5,read:true},
    {title:"A Farewell to Arms",author:"Ernest Hemingway",year:2024,genre:"fiction",rating:4,read:true},
    {title:"Norwegian Wood",author:"Haruki Murakami",year:2024,genre:"fiction",rating:4,read:true},
    {title:"Between the World and Me",author:"Ta-Nehisi Coates",year:2024,genre:"nonfiction",rating:5,read:true},
    {title:"Homo Deus",author:"Yuval Noah Harari",year:2024,genre:"nonfiction",rating:4,read:true},
    {title:"The Kite Runner",author:"Khaled Hosseini",year:2024,genre:"fiction",rating:4,read:true},
    {title:"1984",author:"George Orwell",year:2024,genre:"fiction",rating:5,read:true},
    {title:"Thinking, Fast and Slow",author:"Daniel Kahneman",year:2024,genre:"nonfiction",rating:4,read:true},

    // 2023
    {title:"Midnight's Children",author:"Salman Rushdie",year:2023,genre:"fiction",rating:4,read:true},
    {title:"The Reluctant Fundamentalist",author:"Mohsin Hamid",year:2023,genre:"fiction",rating:5,read:true},
    {title:"Train to Pakistan",author:"Khushwant Singh",year:2023,genre:"fiction",rating:5,read:true},
    {title:"Animal Farm",author:"George Orwell",year:2023,genre:"fiction",rating:4,read:true},
    {title:"The Alchemist",author:"Paulo Coelho",year:2023,genre:"fiction",rating:3,read:true},
  ];

  const CURRENTLY = {title:"Orientalism",author:"Edward Said"};

  // ── RENDER ──────────────────────────────────────────────────
  let activeFilter = 'all';

  function stars(n) {
    return '★'.repeat(n) + '☆'.repeat(5-n);
  }

  function renderCurrently() {
    if (!CURRENTLY) return;
    document.getElementById('currently-reading').innerHTML = `
      <div class="current-reading" style="margin-top:2rem">
        <span class="current-label">Reading now</span>
        <span class="current-book">${CURRENTLY.title}</span>
        <span class="current-author">— ${CURRENTLY.author}</span>
      </div>`;
  }

  function renderBooks(filter) {
    const container = document.getElementById('books-container');
    let filtered = BOOKS;

    if (filter === 'fiction') filtered = BOOKS.filter(b=>b.genre==='fiction');
    else if (filter === 'nonfiction') filtered = BOOKS.filter(b=>b.genre==='nonfiction');
    else if (['2025','2024','2023'].includes(filter)) filtered = BOOKS.filter(b=>String(b.year)===filter);

    // Update stat
    document.getElementById('stat-total').textContent = filtered.length;

    if (filter === 'all' || ['fiction','nonfiction'].includes(filter)) {
      // Group by year
      const years = [...new Set(filtered.map(b=>b.year))].sort((a,b)=>b-a);
      container.innerHTML = years.map(yr => {
        const ybooks = filtered.filter(b=>b.year===yr);
        return `
          <div class="shelf-section">
            <div class="year-label">${yr}</div>
            <div class="book-list">
              ${ybooks.map((b,i)=>`
                <div class="book-row">
                  <span class="book-index">${String(i+1).padStart(2,'0')}</span>
                  <div>
                    <div class="book-title">${b.title}</div>
                    <div class="book-author">${b.author}</div>
                  </div>
                  <div class="book-meta">
                    <span class="book-tag">${b.genre}</span>
                    <span class="book-rating">${stars(b.rating)}</span>
                  </div>
                </div>`).join('')}
            </div>
          </div>`;
      }).join('');
    } else {
      // Single year view
      container.innerHTML = `
        <div class="shelf-section">
          <div class="book-list">
            ${filtered.map((b,i)=>`
              <div class="book-row">
                <span class="book-index">${String(i+1).padStart(2,'0')}</span>
                <div>
                  <div class="book-title">${b.title}</div>
                  <div class="book-author">${b.author}</div>
                </div>
                <div class="book-meta">
                  <span class="book-tag">${b.genre}</span>
                  <span class="book-rating">${stars(b.rating)}</span>
                </div>
              </div>`).join('')}
          </div>
        </div>`;
    }
  }

  function filterBooks(f, btn) {
    document.querySelectorAll('.shelf-tab').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    activeFilter = f;
    renderBooks(f);
  }

  document.addEventListener('DOMContentLoaded', () => {
    renderCurrently();
    renderBooks('all');
    document.getElementById('stat-total').textContent = BOOKS.length;
  });
</script>
</body>
</html>
